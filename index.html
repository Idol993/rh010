<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>连锁商超进销存与会员营销系统</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>商超智管</span>
      </div>
    </div>
    <nav id="nav-menu">
      <div class="nav-group">
        <div class="nav-group-title">核心业务</div>
        <a class="nav-item active" data-page="dashboard"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>店长看板</span></a>
        <a class="nav-item" data-page="inventory"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg><span>进销存管理</span></a>
        <a class="nav-item" data-page="pricing"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg><span>电子价签</span></a>
        <a class="nav-item" data-page="checkout"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><span>收银台</span></a>
      </div>
      <div class="nav-group">
        <div class="nav-group-title">会员营销</div>
        <a class="nav-item" data-page="members"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>会员管理</span></a>
        <a class="nav-item" data-page="promotions"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg><span>促销管理</span></a>
      </div>
      <div class="nav-group">
        <div class="nav-group-title">安全与财务</div>
        <a class="nav-item" data-page="lossprevention"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>防损系统</span></a>
        <a class="nav-item" data-page="finance"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>财务对账</span></a>
      </div>
      <div class="nav-group">
        <div class="nav-group-title">系统</div>
        <a class="nav-item" data-page="permissions"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span>权限管理</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info" id="user-info">
        <div class="user-avatar" id="user-avatar">店</div>
        <div class="user-detail">
          <div class="user-name" id="user-name">张店长</div>
          <div class="user-role" id="user-role">店长</div>
        </div>
      </div>
    </div>
  </aside>

  <main id="main-content">
    <header id="topbar">
      <div class="topbar-left">
        <button id="sidebar-toggle" class="icon-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="breadcrumb" id="breadcrumb">
          <span>首页</span><span class="sep">/</span><span>店长看板</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="alert-bell" id="alert-bell">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge" id="alert-badge">5</span>
        </div>
        <div class="alert-panel" id="alert-panel">
          <div class="alert-panel-header">
            <h3>系统通知</h3>
            <button id="clear-alerts">全部已读</button>
          </div>
          <div class="alert-list" id="alert-list"></div>
        </div>
        <div class="store-selector">
          <select id="store-select">
            <option value="store001">阳光花园店</option>
            <option value="store002">万达广场店</option>
            <option value="store003">龙城大道店</option>
          </select>
        </div>
        <div class="datetime" id="datetime"></div>
      </div>
    </header>
    <div id="page-container"></div>
  </main>
</div>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast-container"></div>

<script src="render.js"></script>
<script src="app.js"></script>
</body>
</html>
